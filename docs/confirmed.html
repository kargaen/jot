<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed — Jot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e1c;
      color: #e4e2de;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      max-width: 420px;
    }
    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #16a34a22;
      border: 2px solid #16a34a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .check svg { width: 32px; height: 32px; }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 15px;
      color: #a8a29e;
      line-height: 1.5;
    }
    .brand {
      margin-top: 32px;
      font-size: 12px;
      color: #57534e;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
    <h1>Email Confirmed</h1>
    <p>You're all set. You can close this tab and open Jot.</p>
    <div class="brand">Jot</div>
  </div>
</body>
</html>
